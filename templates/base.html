<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopBlog{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        nav { background: #2c3e50; padding: 1rem; margin: 0 -20px 2rem; }
        nav a { color: #ecf0f1; text-decoration: none; margin-right: 1.5rem; font-weight: 500; }
        nav a:hover { color: #3498db; }
        h1, h2, h3 { margin-bottom: 0.5rem; }
        .product-card, .post-card, .order-card, .user-card { border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .product-card:hover, .post-card:hover { border-color: #3498db; }
        .tag { display: inline-block; background: #e8f4f8; color: #2980b9; padding: 2px 8px; border-radius: 3px; font-size: 0.85rem; margin: 2px; }
        .rating { color: #f39c12; }
        .meta { color: #7f8c8d; font-size: 0.9rem; }
        .pagination { margin: 2rem 0; }
        .pagination a, .pagination span { margin-right: 0.5rem; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        a { color: #2980b9; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'shop:home' %}">Home</a>
        <a href="{% url 'shop:product-list' %}">Products</a>
        <a href="{% url 'blog:post-list' %}">Blog</a>
        <a href="{% url 'accounts:dashboard' %}">Dashboard</a>
        <a href="{% url 'accounts:user-list' %}">Users</a>
        <a href="{% url 'accounts:activity-log' %}">Activity</a>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
